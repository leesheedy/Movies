<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Notflix</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #141414; overflow: hidden; font-family: Arial, "Helvetica Neue", sans-serif; }
    #splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 34px; }
    #splash img { width: 44vw; max-width: 620px; }
    .bar { width: 240px; height: 4px; border-radius: 4px; background: rgba(255,255,255,.15); overflow: hidden; }
    .bar::after { content: ''; display: block; height: 100%; width: 40%; background: #E50914; border-radius: 4px; animation: load 1.4s ease-in-out infinite; }
    @keyframes load { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
    .err { position: fixed; bottom: 40px; left: 0; right: 0; text-align: center; color: #b3b3b3; font-size: 22px; display: none; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="splash-logo.png" alt="Notflix" />
    <div class="bar"></div>
  </div>
  <p class="err" id="err">Couldn't reach Notflix. Check the TV's internet connection.</p>
  <script>
    (function () {
      // The Notflix experience is served from the cloud; this LG app launches it
      // in 10-foot TV mode (spatial D-pad nav + Magic Remote support).
      var ORIGIN = 'https://mittamovies.netlify.app';
      var TARGET = ORIGIN + '/?tv=1&webos=1';
      var PROBE  = ORIGIN + '/favicon-32.png';   // small asset to test reachability
      var errEl = document.getElementById('err');
      var launched = false;

      function go() {
        if (launched) return; launched = true;
        try { window.location.replace(TARGET); } catch (e) { window.location.href = TARGET; }
      }

      function showError() {
        if (errEl) errEl.style.display = 'block';
        // Recover on its own: retry when the network returns and again shortly,
        // so a transient outage doesn't strand the TV on a dead screen.
        window.addEventListener('online', probeThenGo, { once: true });
        setTimeout(probeThenGo, 8000);
      }

      // Confirm the site is actually reachable BEFORE redirecting. navigator.onLine
      // is unreliable on webOS (often true on DNS failure / captive portal / a
      // Netlify outage), and once we location.replace() this launcher's error UI is
      // gone — so a failed load would leave a blank screen with no recovery. Probe
      // with an <img> (supported on every webOS engine; fetch() is not on the oldest).
      function probeThenGo() {
        if (launched) return;
        if (navigator && navigator.onLine === false) { showError(); return; }
        var img = new Image();
        var done = false;
        var timer = setTimeout(function () {
          if (done) return; done = true; img.onload = img.onerror = null; showError();
        }, 6000);
        img.onload = function () { if (done) return; done = true; clearTimeout(timer); go(); };
        img.onerror = function () { if (done) return; done = true; clearTimeout(timer); showError(); };
        img.src = PROBE + '?_=' + (new Date().getTime()); // cache-bust
      }

      // Show a brief branded splash, then probe + launch.
      setTimeout(probeThenGo, 700);
    })();
  </script>
</body>
</html>
