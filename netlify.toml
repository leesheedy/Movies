[functions]
  directory = "netlify/functions"
  included_files = ["manifest.json"]

[[redirects]]
  from = "/api/providers"
  to = "/.netlify/functions/providers"
  status = 200
  force = true

[[redirects]]
  from = "/env.js"
  to = "/.netlify/functions/env"
  status = 200
  force = true

[[redirects]]
  from = "/movie/*"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/tv/*"
  to = "/index.html"
  status = 200
  force = true

# Catch-all for any unhandled /api/* routes — return a clean 404
# (The app runs fully via TMDB direct API calls; no backend proxy needed)
[[redirects]]
  from = "/api/*"
  to = "/404"
  status = 404
