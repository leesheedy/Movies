[functions]
  directory = "netlify/functions"
  included_files = ["manifest.json"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    X-XSS-Protection = "1; mode=block"

[[redirects]]
  from = "/api/providers"
  to = "/.netlify/functions/providers"
  status = 200
  force = true

[[redirects]]
  from = "/env.js"
  to = "/.netlify/functions/env"
  status = 200
  force = true

[[redirects]]
  from = "/movie/*"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/tv/*"
  to = "/index.html"
  status = 200
  force = true

# Catch-all for any unhandled /api/* routes — return a clean 404
# (The app runs fully via TMDB direct API calls; no backend proxy needed)
[[redirects]]
  from = "/api/*"
  to = "/404"
  status = 404
